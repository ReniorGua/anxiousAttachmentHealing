name = "healing-backend"
main = "index.js"
compatibility_date = "2026-05-03"

# ==========================================
# 告诉 Wrangler：这个域名是我的，别给我删了！
# ==========================================
routes = [
  { pattern = "api.healing-rest-return.cyou", custom_domain = true }
]

[vars]
# ==========================================
# 1. 普通非敏感变量
# ==========================================
ALLOWED_ORIGINS = "*"
DASHSCOPE_MODEL = "qwen3.6-plus"

# ==========================================
# 2. 敏感机密 (Secrets)
# ==========================================
# 线上部署：请在终端使用 `npx wrangler secret put 变量名` 进行设置。
# 本地开发：请把它们写在 server/.dev.vars 文件里。
# DASHSCOPE_API_KEY=sk-xxx
# ACCESS_CODE=xxx